version: '3.8'

services:
  bctg:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bctg-dev
    ports:
      - "3000:3000"
    volumes:
      # Persist database across container restarts
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:///app/data/basscoast.db
      - SERVER_PORT=3000
      - RUST_LOG=debug
    restart: unless-stopped
